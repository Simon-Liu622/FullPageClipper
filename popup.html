<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 250px; padding: 15px; font-family: system-ui, sans-serif; text-align: center; margin: 0; }
    .toolbar { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 10px; }
    select { border: 1px solid #d1d5db; border-radius: 6px; padding: 5px 8px; font-size: 12px; background: white; color: #374151; }
    button { padding: 10px 15px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 14px; font-weight: bold; transition: background 0.2s; margin-bottom: 8px; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    #imageBtn { background: #059669; }
    #imageBtn:hover { background: #047857; }
    #imageBtn:disabled { background: #6ee7b7; }
    #pauseBtn { display: none; background: #d97706; }
    #pauseBtn:hover { background: #b45309; }
    #status { margin-top: 12px; font-size: 12px; color: #4b5563; }
  </style>
</head>
<body>
  <div class="toolbar">
    <select id="languageSelect" aria-label="Language">
      <option value="en">English</option>
      <option value="zh_CN">中文</option>
    </select>
  </div>
  <button id="pdfBtn"></button>
  <button id="imageBtn"></button>
  <button id="pauseBtn"></button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
